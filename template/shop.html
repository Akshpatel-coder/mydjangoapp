            height: 25px;
            border: 1px solid rgb(219, 39, 39);

         }
        .product img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .btn:hover {
            background-color: rgb(10, 202, 240);
            color: rgb(158, 233, 20);

</head>
